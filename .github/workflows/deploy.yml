name: Todo Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  APP_NAME: todo-app

jobs:
  tests:
    env:
      TZ: Europe/Amsterdam
    runs-on: ubuntu-latest
    name: Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Cache Maven dependencies
        uses: actions/cache@v6
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{hashFiles('**/pom.xml')}}
          restore-keys: ${{ runner.os }}-m2

      - name: Create JWT keys directory & files from secrets
        run: |
          mkdir -p src/main/resources/keys/local-only
          echo "${{ secrets.JWT_PRIVATE_KEY }}" > src/main/resources/keys/local-only/private_key.pem
          echo "${{ secrets.JWT_PUBLIC_KEY }}" > src/main/resources/keys/local-only/public_key.pem

      - name: Running Unit Tests
        run: |
          ./mvnw clean test

  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    needs: tests
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Cache Maven dependencies
        uses: actions/cache@v6
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{hashFiles('**/pom.xml')}}
          restore-keys: ${{ runner.os }}-m2

      - name: Create JWT keys directory & files from secrets
        run: |
          mkdir -p src/main/resources/keys/local-only
          echo "${{ secrets.JWT_PRIVATE_KEY }}" > src/main/resources/keys/local-only/private_key.pem
          echo "${{ secrets.JWT_PUBLIC_KEY }}" > src/main/resources/keys/local-only/public_key.pem

      - name: Extract project version
        id: extract_version
        run: |
          echo "VERSION=$(./mvnw -q -Dexec.executable='echo' -Dexec.args='${project.version}' --non-recursive exec:exec)" >> $GITHUB_OUTPUT 

      - name: Build application
        run: ./mvnw clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ steps.extract_version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=mas
          build-args: |
            PROFILE=dev
            APP_VERSION=${{ steps.extract_version.outputs.VERSION }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          passphrase: ${{ secrets.VPS_SSH_KEY_PASSPHRASE }}
          script: |
            cd /opt/${{ env.APP_NAME }} || mkdir -p /opt/${{ env.APP_NAME }} && cd /opt/${{ env.APP_NAME }}
            
            cat > .env << EOF
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            APP_NAME=${{ env.APP_NAME }}
            DB_URL=todo-app
            PG_DB_NAME=${{secrets.PG_DB_NAME}}
            PG_DB_USERNAME=${{secrets.PG_DB_USERNAME}}
            PG_DB_PASSWORD=${{secrets.PG_DB_PASSWORD}}
            EOF
            
            rm docker-compose.dev.yml
            if [ ! -f docker-compose.dev.yml ]; then
              curl -o docker-compose.dev.yml https://raw.githubusercontent.com/fadyMarty/todo/refs/heads/main/docker-compose.dev.yaml
            fi
            
            # Pull latest image
            docker compose -f docker-compose.dev.yml --env-file .env pull
            
            # Stop and remove old containers
            docker compose -f docker-compose.dev.yml --env-file .env down
            
            # Start new containers
            docker compose -f docker-compose.dev.yml --env-file .env up -d
            
            # Clean up old images
            docker image prune -f